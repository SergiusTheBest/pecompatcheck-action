name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'

jobs:
  test-file-not-found:
    name: Negative - binary file not found (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with non-existent binary (expect failure)
        id: check
        uses: ./
        continue-on-error: true
        with:
          binary: non-existent-file.dll
          windows-version: vista-sp2

      - name: Verify action failed
        if: steps.check.outcome != 'failure'
        run: |
          echo "Expected the action to fail when the binary file is not found, but it succeeded."
          exit 1

  test-unresolved-imports:
    name: Negative - unresolved imports (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with driver.sys requiring Windows 10 (expect failure)
        id: check
        uses: ./
        continue-on-error: true
        with:
          binary: tests/negative/driver.sys
          windows-version: vista-sp2

      - name: Verify action failed
        if: steps.check.outcome != 'failure'
        run: |
          echo "Expected the action to fail due to unresolved imports on vista-sp2, but it succeeded."
          exit 1

  test-positive:
    name: Positive - single binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with driver.sys (expect success)
        uses: ./
        with:
          binary: tests/positive/driver.sys
          windows-version: vista-sp2

  test-positive-multiple:
    name: Positive - multiple binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with two binaries (expect success)
        uses: ./
        with:
          binary: |
            tests/positive/driver.sys
            tests/positive/driver.sys
          windows-version: vista-sp2
