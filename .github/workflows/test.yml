name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:

jobs:
  test-file-not-found:
    name: Negative - binary file not found (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with non-existent binary (expect failure)
        id: check
        uses: ./
        continue-on-error: true
        with:
          binary: non-existent-file.dll
          windows-version: vista-sp2

      - name: Verify action failed
        if: steps.check.outcome != 'failure'
        run: |
          echo "Expected the action to fail when the binary file is not found, but it succeeded."
          exit 1

  test-positive:
    name: Positive - driver.sys (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with driver.sys (expect success)
        uses: ./
        with:
          binary: tests/positive/driver.sys
          windows-version: vista-sp2
